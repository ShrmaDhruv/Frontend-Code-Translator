version: "3.9"

services:
  ollama-service:
    image: ollama/ollama
    container_name: ollama-dhruv
    ports:
      - "11435:11434"
    volumes:
      - /home/ubuntu/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    restart: unless-stopped
  backend-service:
    build: ./
    image: frontend-convertor-app:v1
    container_name: frontend-convertor-app-container
    ports:
      - "80:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama-service:11434
    depends_on:
      - ollama-service
